spring.application.name=frontOffice

# Base URL du back-office déployé sur Tomcat sous le context-path /reservation
# Le WAR est nommé reservation.war → context = /reservation
reservation.api.base-url=http://localhost:8080/reservation

# Port du front-office (le back-office Tomcat utilise le port 8080)
server.port=8090

# Désactiver write-dates-as-timestamps pour les dates ISO (cohérence avec le back-office)
spring.jackson.serialization.write-dates-as-timestamps=false
